name: deploy-production

on:
  push:
    branches: [ "main" ]
    paths:
      - "config/applications/**"
      - "schemas/**"
      - "modules/**"
      - "scripts/**"

permissions:
  id-token: write
  contents: read
  deployments: write

concurrency:
  group: gsa-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PowerShell 7
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion.Major -lt 7) { throw 'PowerShell 7 erforderlich.' }

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.GSA_GRAPH_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Deploy (idempotent reconcile)
        shell: pwsh
        env:
          GSA_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          foreach ($m in @('powershell-yaml', 'Microsoft.Graph.Authentication')) {
            if (-not (Get-Module -ListAvailable -Name $m)) {
              Install-Module $m -Scope CurrentUser -Force -AllowClobber
            }
          }
          Import-Module Microsoft.Graph.Authentication -ErrorAction Stop
          & (Join-Path "${{ github.workspace }}" "scripts/deploy/Invoke-ProductionDeployment.ps1") -RepoRoot "${{ github.workspace }}"

      - name: Upload deployment bundle (audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desired-state-${{ github.sha }}
          path: |
            ${{ github.workspace }}/config/applications
            ${{ github.workspace }}/schemas
