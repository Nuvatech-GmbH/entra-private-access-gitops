apiVersion: gsa.gitops/v1
kind: PrivateAccessApplication
metadata:
  name: PA-DEMO-SEGMENT-IPADDRESS
  description: "Demo IP-Adresse – Host des Private-Access-Connectors (Win-Server 192.168.178.42), RDP 3389."
  owners:
    - platform@nuvatech.com
  changeReference: DEMO-SEGMENT-IPADDRESS-001
  tags:
    purpose: demo
    segmentType: ipAddress
spec:
  applicationType: enterprise
  isAccessibleViaZTNAClient: true
  connectorGroup: Office-Gersthofen
  destinations:
    # IP des Connector-Win-Servers – vom Connector-Netz aus erreichbar (inkl. Loopback zum eigenen Host)
    - host: "192.168.178.42"
      type: ipAddress
      ports: ["3389-3389"]
      protocol: tcp
  assignments:
    - principalType: Group
      principalName: SEC-GSA-PA-DEMO-USERS
