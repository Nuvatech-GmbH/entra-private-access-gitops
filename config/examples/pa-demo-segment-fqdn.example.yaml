apiVersion: gsa.gitops/v1
kind: PrivateAccessApplication
metadata:
  name: PA-DEMO-SEGMENT-FQDN
  description: "Demo FQDN – RDP zu dc01.contoso.corp."
  owners:
    - platform@contoso.com
  changeReference: DEMO-SEGMENT-FQDN-001
  tags:
    purpose: demo
    segmentType: fqdn
spec:
  applicationType: enterprise
  isAccessibleViaZTNAClient: true
  connectorGroup: CG-EU-CENTRAL-PA-PROD-01
  destinations:
    - host: dc01.contoso.corp
      type: fqdn
      ports: ["3389"]
      protocol: tcp
  assignments:
    - principalType: Group
      principalName: SEC-GSA-PA-DEMO-USERS
